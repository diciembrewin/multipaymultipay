<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            margin: 0;
            padding: 20px;
        }

        .loader-container {
            text-align: center;
            padding: 40px;
        }

        /* CÍRCULO ROJO CARGANDO */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0d0d0;
            border-top: 4px solid #8B1A1A;
            border-right: 4px solid #8B1A1A;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(139, 26, 26, 0.06);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* PUNTOS DE CARGA */
        .dots {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8B1A1A;
            opacity: 0.2;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        .dot:nth-child(4) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* TEXTO DE CARGA - ROJO SUAVE */
        .loading-text {
            margin-top: 24px;
            font-size: 0.95rem;
            color: #8B4A4A;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .loading-text-en {
            margin-top: 4px;
            font-size: 0.8rem;
            color: #C47878;
            font-weight: 400;
        }

        @media (max-width: 480px) {
            .spinner {
                width: 48px;
                height: 48px;
                border-width: 3.5px;
            }
            .loading-text {
                font-size: 0.85rem;
            }
            .loader-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="loader-container">

        <!-- SOLO CÍRCULO ROJO CARGANDO -->
        <div class="spinner"></div>

        <!-- PUNTOS ANIMADOS -->
        <div class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <!-- TEXTO DE CARGA -->
        <p class="loading-text">Cargando...</p>
        <p class="loading-text-en">Loading...</p>

    </div>

    <!-- ✅ REDIRECCIÓN POR PAÍS -->
    <script>
        function redirigirPorPais(pais) {
            if (pais === 'AR') {
                window.location.href = 'ar.html';
            } else {
                window.location.href = 'inicio.html';
            }
        }

        fetch('https://ipapi.co/json/')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                redirigirPorPais(data.country);
            })
            .catch(function() {
                window.location.href = 'inicio.html';
            });
    </script>

</body>
</html>
