<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiPay - Cargando...</title>
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://multipaymultipay.vercel.app/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            margin: 0;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            .spinner { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>

    <!-- ✅ REDIRECCIÓN CON JAVASCRIPT -->
    <script>
        // Función para redirigir según país
        function redirigirPorPais(pais) {
            if (pais === 'AR') {
                window.location.href = 'ar.html';
            } else {
                window.location.href = 'inicio.html';
            }
        }

        // Intentar detectar país con ipapi.co
        fetch('https://ipapi.co/json/')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                console.log('País detectado:', data.country);
                redirigirPorPais(data.country);
            })
            .catch(function(error) {
                console.log('Error detectando país, redirigiendo a inicio.html');
                window.location.href = 'inicio.html';
            });
    </script>
</body>
</html>
